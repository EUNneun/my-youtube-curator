name: Saved YouTube Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync saved playlists
        env:
          YOUTUBE_OAUTH_TOKEN_JSON: ${{ secrets.YOUTUBE_OAUTH_TOKEN_JSON }}
          YOUTUBE_SAVED_PLAYLIST_IDS: ${{ secrets.YOUTUBE_SAVED_PLAYLIST_IDS }}
        run: python scripts/sync_saved_playlists.py

      - name: Commit synced videos
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase --autostash origin main
          git add saved_videos.json videos.json site/videos.json
          git diff --cached --quiet || git commit -m "chore: sync saved youtube videos"
          git push origin HEAD
