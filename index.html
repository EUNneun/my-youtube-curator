<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 저장 영상 요약함</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Saved YouTube Library</p>
      <h1>저장한 영상 요약함</h1>
    </div>
    <div class="stats" aria-live="polite">
      <span id="totalCount">0</span>
      <small>videos</small>
    </div>
  </header>

  <main class="workspace">
    <section class="control-panel" aria-label="영상 가져오기 및 필터">
      <div class="import-box">
        <label class="file-button">
          <input id="fileInput" type="file" accept=".json,.csv,.txt,.html,.htm" multiple>
          파일 불러오기
        </label>
        <button id="sampleButton" type="button">샘플 보기</button>
      </div>

      <textarea id="linkInput" placeholder="YouTube 링크를 한 줄에 하나씩 붙여넣기"></textarea>
      <div class="import-actions">
        <button id="parseLinksButton" type="button">목록 만들기</button>
        <button id="clearButton" type="button">초기화</button>
      </div>

      <div class="field">
        <label for="searchInput">검색</label>
        <input id="searchInput" type="search" placeholder="제목, 채널, 요약">
      </div>

      <div class="field">
        <label for="sortSelect">정렬</label>
        <select id="sortSelect">
          <option value="savedAtDesc">최근 저장순</option>
          <option value="titleAsc">제목순</option>
          <option value="channelAsc">채널순</option>
        </select>
      </div>

      <div class="topic-list" id="topicList" aria-label="주제 필터"></div>
    </section>

    <section class="content-area">
      <div class="summary-strip" id="summaryStrip"></div>
      <div class="video-grid" id="videoGrid"></div>
      <div class="empty-state" id="emptyState">
        <h2>저장한 영상 목록을 불러오세요</h2>
        <p>Google Takeout의 YouTube 기록 파일, 재생목록 CSV/HTML, 또는 YouTube 링크 목록을 사용할 수 있습니다.</p>
      </div>
    </section>
  </main>

  <template id="videoCardTemplate">
    <article class="video-card">
      <a class="thumb-link" target="_blank" rel="noopener">
        <img class="thumb" alt="" loading="lazy">
      </a>
      <div class="card-body">
        <div class="meta-row">
          <span class="topic"></span>
          <span class="saved-at"></span>
        </div>
        <h2><a class="title-link" target="_blank" rel="noopener"></a></h2>
        <p class="channel"></p>
        <p class="summary"></p>
        <div class="actions">
          <button class="mark-done" type="button">봤음</button>
          <a class="open-video" target="_blank" rel="noopener">YouTube</a>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
