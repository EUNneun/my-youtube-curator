<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 저장 영상 큐레이터</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <div>
      <p class="eyebrow">YouTube Playlist Curator</p>
      <h1>저장한 영상</h1>
      <p class="subtitle">재생목록에 추가한 영상을 한눈에 보고, 설명으로 빠르게 다시 고르세요.</p>
    </div>
    <div class="count-box" aria-live="polite">
      <strong id="totalCount">0</strong>
      <span>videos</span>
    </div>
  </header>

  <main class="page-shell">
    <section class="toolbar" aria-label="영상 필터">
      <div class="search-wrap">
        <label for="searchInput">검색</label>
        <input id="searchInput" type="search" placeholder="제목, 채널, 설명 검색">
      </div>
      <div class="sort-wrap">
        <label for="sortSelect">정렬</label>
        <select id="sortSelect">
          <option value="savedAtDesc">최근 추가순</option>
          <option value="titleAsc">제목순</option>
          <option value="channelAsc">채널순</option>
        </select>
      </div>
    </section>

    <nav class="topic-list" id="topicList" aria-label="주제 필터"></nav>

    <section class="video-list" id="videoList" aria-label="저장 영상 목록"></section>

    <section class="empty-state" id="emptyState">
      <h2>아직 표시할 영상이 없습니다</h2>
      <p>GitHub Actions 동기화가 끝나면 재생목록의 영상들이 이곳에 자동으로 나타납니다.</p>
    </section>
  </main>

  <template id="videoItemTemplate">
    <article class="video-item">
      <a class="thumb-link" target="_blank" rel="noopener">
        <img class="thumb" alt="" loading="lazy">
      </a>
      <div class="video-copy">
        <div class="meta-row">
          <span class="topic"></span>
          <span class="saved-at"></span>
        </div>
        <h2><a class="title-link" target="_blank" rel="noopener"></a></h2>
        <p class="channel"></p>
        <p class="summary"></p>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
